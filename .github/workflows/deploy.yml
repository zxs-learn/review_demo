name: FastAPI CI/CD with uv

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Init uv env
        run: uv venv --python 3.11

      # - name: Install Tcode
      #   run: npm install --foreground-scripts -g @brandon_9527/tcode 

      - name: Run Tcode Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          DEFAULT_MODEL: ${{ secrets.DEFAULT_MODEL }}
        run: |
          echo "Running Tcode Review..."
          touch review_report.md

          cat > review_report.md << EOF
          uv --version
          npm --version
          node --version

          OPENAI_API_KEY: $OPENAI_API_KEY
          OPENAI_API_BASE: $OPENAI_API_BASE
          DEFAULT_MODEL: $DEFAULT_MODEL
          EOF

          uv --version
          npm --version
          node --version

          echo "OPENAI_API_KEY: $OPENAI_API_KEY"
          echo "OPENAI_API_BASE: $OPENAI_API_BASE"
          echo "DEFAULT_MODEL: $DEFAULT_MODEL"

      - name: Post review to PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('review_report.md', 'utf8');
            // 向PR添加评论
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: report  // Markdown报告将被渲染
            });

      # - name: Install dependencies (with dev)
      #   run: source .venv/bin/activate && uv pip install -e .

      # - name: Run tests
      #   run: uv run pytest  # 假设存在测试文件，若无可注释
